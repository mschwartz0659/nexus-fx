global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: api-gateway
    metrics_path: /metrics
    static_configs:
      - targets: ["api-gateway:8000"]

  - job_name: engine
    metrics_path: /metrics
    static_configs:
      - targets: ["engine:8002"]

  - job_name: price-service
    metrics_path: /metrics
    static_configs:
      - targets: ["price-service:8001"]